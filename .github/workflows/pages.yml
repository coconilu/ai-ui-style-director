name: Catalog Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: catalog-pages-${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build static catalog
        run: npm run catalog:build
      - name: Validate Pages artifact
        shell: bash
        run: |
          test -f dist/pages/index.html
          test -f dist/pages/catalog.json
          test -f dist/pages/app.js
          test -f dist/pages/styles.css
          test -f dist/pages/.nojekyll
          expected="$(node -p "require('./dist/pages/catalog.json').styleCount")"
          actual="$(find dist/pages/previews -type f -name '*.svg' | wc -l)"
          test "$actual" -eq "$expected"
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/pages

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
