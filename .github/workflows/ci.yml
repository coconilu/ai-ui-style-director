name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Validate automated refresh scope
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'automation/refresh-providers-')
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          allowed='^catalog/generated/(provider-inventory|style-sources|component-sources)\.json$'
          unexpected="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Ev "$allowed" || true)"
          if [ -n "$unexpected" ]; then
            echo "Automated refresh PR contains files outside the generated catalog:" >&2
            echo "$unexpected" >&2
            exit 1
          fi
      - name: Validate automated curation scope
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'automation/curate-style-sources-')
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          allowed='^(catalog/style-(directions|themes|direction-themes|preview-specs)\.json|catalog/curation/source-state\.json|catalog/curation/records/[0-9a-f]{64}\.json)$'
          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          unexpected="$(printf '%s\n' "$changed_files" | grep -Ev "$allowed" || true)"
          deleted="$(git diff --diff-filter=D --name-only "$BASE_SHA" "$HEAD_SHA")"
          non_added_records="$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" | awk '$2 ~ /^catalog\/curation\/records\// && $1 != "A" { print }')"
          added_records="$(git diff --diff-filter=A --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Ec '^catalog/curation/records/[0-9a-f]{64}\.json$' || true)"

          if [ -z "$changed_files" ]; then
            echo "Automated curation PR must contain catalog changes." >&2
            exit 1
          fi
          if [ -n "$unexpected" ]; then
            echo "Automated curation PR contains files outside its allowlist:" >&2
            echo "$unexpected" >&2
            exit 1
          fi
          if [ -n "$deleted" ]; then
            echo "Automated curation PR must not delete catalog or audit artifacts:" >&2
            echo "$deleted" >&2
            exit 1
          fi
          if [ -n "$non_added_records" ]; then
            echo "Curation records are append-only:" >&2
            echo "$non_added_records" >&2
            exit 1
          fi
          if [ "$added_records" -lt 1 ]; then
            echo "Automated curation PR must add at least one immutable curation record." >&2
            exit 1
          fi
          if ! printf '%s\n' "$changed_files" | grep -qx 'catalog/curation/source-state.json'; then
            echo "Automated curation PR must update catalog/curation/source-state.json." >&2
            exit 1
          fi
      - run: npm test
      - run: npm run check
