name: Curate Style Sources

on:
  schedule:
    - cron: "30 19 * * *"
  push:
    branches: [main]
    paths:
      - catalog/providers.json
      - src/curation.mjs
      - src/provider-adapters.mjs
      - catalog/generated/provider-inventory.json
      - catalog/generated/style-sources.json
      - catalog/curation/source-state.json
      - catalog/style-directions.json
      - catalog/style-themes.json
      - catalog/style-direction-themes.json
      - catalog/style-preview-specs.json
  workflow_dispatch:
    inputs:
      curator_provider:
        description: Model provider for this run
        required: false
        default: deepseek
        type: choice
        options:
          - deepseek
          - kimi

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: curate-style-sources
  cancel-in-progress: false

jobs:
  curate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CURATOR_PROVIDER: ${{ github.event.inputs.curator_provider || vars.CURATOR_PROVIDER || 'deepseek' }}
      CURATOR_BATCH_SIZE: "5"
      CURATOR_MAX_INPUT_CHARS: "80000"
      CURATOR_MAX_OUTPUT_TOKENS: "4096"
      CURATOR_MAX_RETRIES: "1"
      CURATOR_REQUEST_TIMEOUT_MS: "120000"
      CURATION_RESULT: /tmp/curation-result.json
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Detect existing curation pull request
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          open_prs="$(gh pr list --state open --limit 1000 --json headRefName,url \
            --jq '.[] | select(.headRefName | startswith("automation/curate-style-sources-")) | .url')"
          if [ -n "$open_prs" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            printf '### Automated style curation\n\nSkipped because an earlier curation PR is still open:\n\n%s\n' \
              "$open_prs" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate trusted base
        if: steps.guard.outputs.skip != 'true'
        run: npm run check

      - name: Resolve curator provider
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          case "$CURATOR_PROVIDER" in
            deepseek)
              {
                echo "CURATOR_BASE_URL=https://api.deepseek.com"
                echo "CURATOR_MODEL=deepseek-v4-flash"
                echo "CURATOR_TEMPERATURE=0"
                echo "CURATOR_THINKING=disabled"
              } >> "$GITHUB_ENV"
              ;;
            kimi)
              {
                echo "CURATOR_BASE_URL=https://api.kimi.com/coding/v1"
                echo "CURATOR_MODEL=kimi-for-coding"
                echo "CURATOR_TEMPERATURE=1"
                echo "CURATOR_THINKING="
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unsupported CURATOR_PROVIDER: $CURATOR_PROVIDER"
              exit 1
              ;;
          esac

      - name: Curate changed sources with DeepSeek
        if: steps.guard.outputs.skip != 'true' && env.CURATOR_PROVIDER == 'deepseek'
        env:
          CURATOR_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        shell: bash
        run: |
          if [ -z "$CURATOR_API_KEY" ]; then
            echo "::error::DEEPSEEK_API_KEY is not configured"
            exit 1
          fi
          node scripts/curate-style-sources.mjs \
            --drain \
            --clone \
            --cache-dir .ui-style-director/cache/providers \
            --output "$CURATION_RESULT" \
            --batch-size "$CURATOR_BATCH_SIZE" \
            --max-input-chars "$CURATOR_MAX_INPUT_CHARS" \
            --max-output-tokens "$CURATOR_MAX_OUTPUT_TOKENS"

      - name: Curate changed sources with Kimi
        if: steps.guard.outputs.skip != 'true' && env.CURATOR_PROVIDER == 'kimi'
        env:
          CURATOR_API_KEY: ${{ secrets.KIMI_CODE_API_KEY }}
        shell: bash
        run: |
          if [ -z "$CURATOR_API_KEY" ]; then
            echo "::error::KIMI_CODE_API_KEY is not configured"
            exit 1
          fi
          node scripts/curate-style-sources.mjs \
            --drain \
            --clone \
            --cache-dir .ui-style-director/cache/providers \
            --output "$CURATION_RESULT" \
            --batch-size "$CURATOR_BATCH_SIZE" \
            --max-input-chars "$CURATOR_MAX_INPUT_CHARS" \
            --max-output-tokens "$CURATOR_MAX_OUTPUT_TOKENS"

      - name: Read curation result
        if: steps.guard.outputs.skip != 'true'
        id: result
        env:
          RESULT_PATH: ${{ env.CURATION_RESULT }}
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from "node:fs";

          const result = JSON.parse(readFileSync(process.env.RESULT_PATH, "utf8"));
          if (typeof result.changed !== "boolean") {
            throw new Error("curation result must contain a boolean changed field");
          }

          const count = (field) => {
            const value = result[field] ?? 0;
            if (!Number.isInteger(value) || value < 0) {
              throw new Error(`curation result ${field} must be a non-negative integer`);
            }
            return value;
          };

          const pending = count("pending");
          const remaining = count("remaining");
          const processed = count("processed");
          const records = Array.isArray(result.records) ? result.records : [];
          const actionCount = (action) => records.filter((record) => (
            record?.action === action || record?.result?.action === action
          )).length;
          if (result.changed && remaining !== 0) {
            throw new Error(`curation drain must finish with zero remaining sources, got ${remaining}`);
          }
          if (result.changed && processed !== pending) {
            throw new Error(`curation drain must process all ${pending} pending sources, got ${processed}`);
          }

          const output = [
            `changed=${result.changed}`,
            `batch_size=${count("batchSize")}`,
            `batches=${count("batches")}`,
            `pending=${pending}`,
            `remaining=${remaining}`,
            `processed=${processed}`,
            `promoted=${count("promoted")}`,
            `duplicates=${count("duplicates")}`,
            `skipped=${count("skipped")}`,
            `invalid=${count("invalid")}`,
            `created_direction_and_theme=${actionCount("created-direction-and-theme")}`,
            `created_direction_with_existing_theme=${actionCount("created-direction-with-existing-theme")}`,
            `added_theme_to_direction=${actionCount("added-theme-to-direction")}`,
            `linked_existing_theme=${actionCount("linked-existing-theme")}`,
            `duplicate_theme=${actionCount("duplicate-theme")}`
          ].join("\n");
          appendFileSync(process.env.GITHUB_OUTPUT, `${output}\n`, "utf8");
          NODE

      - name: Validate deterministic change scope
        if: steps.result.outputs.changed == 'true'
        shell: bash
        run: |
          allowed='^(catalog/style-(directions|themes|direction-themes|preview-specs)\.json|catalog/curation/source-state\.json|catalog/curation/records/[0-9a-f]{64}\.json)$'
          changed_files="$(git status --porcelain=v1 --untracked-files=all | sed -E 's/^.. //')"
          unexpected="$(printf '%s\n' "$changed_files" | grep -Ev "$allowed" || true)"
          deleted="$(git status --porcelain=v1 --untracked-files=all | awk 'substr($0, 1, 2) ~ /D/ { print substr($0, 4) }')"
          changed_records="$(git status --porcelain=v1 --untracked-files=all -- catalog/curation/records | grep -Ev '^\?\? catalog/curation/records/[0-9a-f]{64}\.json$' || true)"
          added_records="$(printf '%s\n' "$changed_files" | grep -Ec '^catalog/curation/records/[0-9a-f]{64}\.json$' || true)"

          if [ -z "$changed_files" ]; then
            echo "Curator reported changes but did not produce tracked artifacts." >&2
            exit 1
          fi
          if [ -n "$unexpected" ]; then
            echo "Automated curation changed files outside its allowlist:" >&2
            echo "$unexpected" >&2
            exit 1
          fi
          if [ -n "$deleted" ]; then
            echo "Automated curation must not delete catalog or audit artifacts:" >&2
            echo "$deleted" >&2
            exit 1
          fi
          if [ -n "$changed_records" ]; then
            echo "Curation records are append-only and must use their processing-event hash as the filename:" >&2
            echo "$changed_records" >&2
            exit 1
          fi
          if [ "$added_records" -lt 1 ]; then
            echo "Automated curation must add at least one immutable curation record." >&2
            exit 1
          fi
          if ! printf '%s\n' "$changed_files" | grep -qx 'catalog/curation/source-state.json'; then
            echo "Automated curation must update catalog/curation/source-state.json." >&2
            exit 1
          fi

          git diff --check

      - name: Reject undeclared changes on no-op
        if: steps.guard.outputs.skip != 'true' && steps.result.outputs.changed != 'true'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain=v1)" ]; then
            echo "Curator reported a no-op but changed tracked artifacts:" >&2
            git status --short >&2
            exit 1
          fi

          printf '### Automated style curation\n\nNo new or changed source content was found. No model-backed catalog change was proposed.\n' >> "$GITHUB_STEP_SUMMARY"

      - name: Validate curated output
        if: steps.result.outputs.changed == 'true'
        run: npm run check

      # The write-capable installation token is intentionally created only after
      # model output has passed deterministic scope and repository validation.
      - name: Create curation bot token
        if: steps.result.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.REFRESH_APP_CLIENT_ID }}
          private-key: ${{ secrets.REFRESH_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Configure curation bot identity
        if: steps.result.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          app_slug="${{ steps.app-token.outputs.app-slug }}"
          app_user_id="$(gh api "/users/${app_slug}[bot]" --jq .id)"
          git config user.name "${app_slug}[bot]"
          git config user.email "${app_user_id}+${app_slug}[bot]@users.noreply.github.com"
          gh auth setup-git

      - name: Commit and open draft pull request
        if: steps.result.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RESULT_PATH: ${{ env.CURATION_RESULT }}
          BATCH_SIZE: ${{ steps.result.outputs.batch_size }}
          BATCHES: ${{ steps.result.outputs.batches }}
          PENDING: ${{ steps.result.outputs.pending }}
          REMAINING: ${{ steps.result.outputs.remaining }}
          PROCESSED: ${{ steps.result.outputs.processed }}
          PROMOTED: ${{ steps.result.outputs.promoted }}
          DUPLICATES: ${{ steps.result.outputs.duplicates }}
          SKIPPED: ${{ steps.result.outputs.skipped }}
          INVALID: ${{ steps.result.outputs.invalid }}
          CREATED_DIRECTION_AND_THEME: ${{ steps.result.outputs.created_direction_and_theme }}
          CREATED_DIRECTION_WITH_EXISTING_THEME: ${{ steps.result.outputs.created_direction_with_existing_theme }}
          ADDED_THEME_TO_DIRECTION: ${{ steps.result.outputs.added_theme_to_direction }}
          LINKED_EXISTING_THEME: ${{ steps.result.outputs.linked_existing_theme }}
          DUPLICATE_THEME: ${{ steps.result.outputs.duplicate_theme }}
        run: |
          branch="automation/curate-style-sources-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$branch"
          git add \
            catalog/style-directions.json \
            catalog/style-themes.json \
            catalog/style-direction-themes.json \
            catalog/style-preview-specs.json \
            catalog/curation/source-state.json \
            catalog/curation/records
          git commit -m "feat(catalog): curate updated style sources"

          git fetch origin main
          if ! git diff --quiet "$GITHUB_SHA" origin/main -- \
            catalog \
            src \
            scripts \
            package.json \
            .github/workflows/curate-style-sources.yml \
            .github/workflows/ci.yml; then
            echo "Catalog, curation policy, or executable inputs changed while this run was active; regenerate from the newer main branch." >&2
            exit 1
          fi
          git rebase origin/main
          npm run check

          changed_files="$(git diff --name-only origin/main...HEAD)"
          allowed='^(catalog/style-(directions|themes|direction-themes|preview-specs)\.json|catalog/curation/source-state\.json|catalog/curation/records/[0-9a-f]{64}\.json)$'
          unexpected="$(printf '%s\n' "$changed_files" | grep -Ev "$allowed" || true)"
          deleted="$(git diff --diff-filter=D --name-only origin/main...HEAD)"
          non_added_records="$(git diff --name-status origin/main...HEAD | awk '$2 ~ /^catalog\/curation\/records\// && $1 != "A" { print }')"
          added_records="$(git diff --diff-filter=A --name-only origin/main...HEAD | grep -Ec '^catalog/curation/records/[0-9a-f]{64}\.json$' || true)"
          if [ -z "$changed_files" ] || [ -n "$unexpected" ] || [ -n "$deleted" ] || [ -n "$non_added_records" ] || [ "$added_records" -lt 1 ]; then
            echo "Committed curation diff does not match the automation allowlist." >&2
            echo "$unexpected" >&2
            echo "$deleted" >&2
            echo "$non_added_records" >&2
            exit 1
          fi
          if ! printf '%s\n' "$changed_files" | grep -qx 'catalog/curation/source-state.json'; then
            echo "Committed curation diff must update catalog/curation/source-state.json." >&2
            exit 1
          fi

          git push --set-upstream origin "$branch"

          body_file="$RUNNER_TEMP/style-curation-pr.md"
          BODY_PATH="$body_file" \
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
          BASE_SHA="$GITHUB_SHA" \
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const result = JSON.parse(readFileSync(process.env.RESULT_PATH, "utf8"));
          const usage = result.usage && typeof result.usage === "object" ? result.usage : {};
          const records = Array.isArray(result.records) ? result.records : [];
          const safe = (value, max = 240) => String(value ?? "")
            .replace(/[\u0000-\u001f\u007f]/gu, " ")
            .replace(/[<>&`*_[\]#|\\]/gu, "")
            .replace(/\s+/gu, " ")
            .trim()
            .slice(0, max);
          const metric = (...keys) => {
            for (const key of keys) {
              const value = usage[key];
              if (Number.isFinite(value) && value >= 0) return String(value);
            }
            return "not reported";
          };

          const lines = [
            "Automated, model-assisted curation of changed upstream UI style sources.",
            "",
            "## Run",
            "",
            `- Workflow: ${process.env.RUN_URL}`,
            `- Base commit: ${process.env.BASE_SHA}`,
            `- Provider: ${safe(process.env.CURATOR_PROVIDER, 40)} (OpenAI-compatible: ${process.env.CURATOR_BASE_URL})`,
            `- Model: ${safe(process.env.CURATOR_MODEL, 80)}`,
            `- Prompt version: ${safe(result.promptVersion || "not reported", 80)}`,
            `- Batch size: ${process.env.BATCH_SIZE}`,
            `- Batches: ${process.env.BATCHES}`,
            "",
            "## Decisions",
            "",
            `- Pending at start: ${process.env.PENDING}`,
            `- Remaining: ${process.env.REMAINING}`,
            `- Processed: ${process.env.PROCESSED}`,
            `- Promoted: ${process.env.PROMOTED}`,
            `- Duplicates: ${process.env.DUPLICATES}`,
            `- Skipped: ${process.env.SKIPPED}`,
            `- Invalid: ${process.env.INVALID}`,
            `- Created Direction + Theme: ${process.env.CREATED_DIRECTION_AND_THEME}`,
            `- Created Direction with existing Theme: ${process.env.CREATED_DIRECTION_WITH_EXISTING_THEME}`,
            `- Added Theme to Direction: ${process.env.ADDED_THEME_TO_DIRECTION}`,
            `- Linked existing Theme: ${process.env.LINKED_EXISTING_THEME}`,
            `- Duplicate Theme: ${process.env.DUPLICATE_THEME}`
          ];

          for (const record of records.slice(0, 50)) {
            const source = safe(record.sourceId || `${record.providerId || "source"}:${record.path || "unknown"}`, 180);
            const action = safe(record.action || record.result?.action || record.decision || record.status || "recorded", 60);
            const directionId = safe(record.directionId || record.result?.directionId || "none", 100);
            const themeId = safe(record.themeId || record.result?.themeId || "none", 100);
            const reason = safe(record.reason || "See the machine-readable curation record.", 260);
            lines.push(`- ${source}: ${action} | Direction: ${directionId} | Theme: ${themeId} - ${reason}`);
          }
          if (records.length > 50) lines.push(`- ...and ${records.length - 50} more audited decisions.`);

          lines.push(
            "",
            "## Deterministic gates",
            "",
            "- Pinned provider revision and source content hash: passed",
            "- Changed-file allowlist: passed",
            "- Curated catalog and provenance validation: passed",
            "- Preview generation and repository test suite: passed",
            "",
            "## Usage",
            "",
            `- Input tokens: ${metric("inputTokens", "promptTokens", "prompt_tokens")}`,
            `- Output tokens: ${metric("outputTokens", "completionTokens", "completion_tokens")}`,
            `- Total tokens: ${metric("totalTokens", "total_tokens")}`,
            "",
            "Review policy: created as a draft; a maintainer must review, mark it ready, and merge it manually. Full normalized decisions remain in catalog/curation/records."
          );

          writeFileSync(process.env.BODY_PATH, `${lines.join("\n")}\n`, "utf8");
          NODE

          pr_url="$(gh pr create \
            --title "feat(catalog): curate ${PROMOTED} updated style source(s)" \
            --body-file "$body_file" \
            --base main \
            --head "$branch" \
            --draft)"

          printf '### Automated style curation\n\n- Draft PR: %s\n- Batches: %s × up to %s sources\n- Processed: %s\n- Promoted: %s\n- Duplicates: %s\n- Skipped: %s\n- Invalid: %s\n- Created Direction + Theme: %s\n- Created Direction with existing Theme: %s\n- Added Theme to Direction: %s\n- Linked existing Theme: %s\n- Duplicate Theme: %s\n- Review: maintainer review and manual merge required\n' \
            "$pr_url" "$BATCHES" "$BATCH_SIZE" "$PROCESSED" "$PROMOTED" "$DUPLICATES" "$SKIPPED" "$INVALID" \
            "$CREATED_DIRECTION_AND_THEME" "$CREATED_DIRECTION_WITH_EXISTING_THEME" "$ADDED_THEME_TO_DIRECTION" \
            "$LINKED_EXISTING_THEME" "$DUPLICATE_THEME" >> "$GITHUB_STEP_SUMMARY"
