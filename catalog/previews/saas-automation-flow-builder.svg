"201" stroke="#6D4AFF" stroke-width="3" marker-end="url(#arrow)"/><rect x="660" y="156" width="148" height="90" rx="12" fill="#EEF0F8" stroke="#D9DDEA" /><text x="734" y="207" fill="#6D4AFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">POLICY</text><line x1="808" y1="201" x2="850" y2="201" stroke="#6D4AFF" stroke-width="3" marker-end="url(#arrow)"/><rect x="850" y="156" width="148" height="90" rx="12" fill="#EEF0F8" stroke="#D9DDEA" /><text x="924" y="207" fill="#171A2B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">OUTPUT</text><rect x="430" y="418" width="208" height="68" rx="12" fill="#EEF0F8" stroke="#D9DDEA" /><rect x="650" y="418" width="208" height="68" rx="12" fill="#EEF0F8" stroke="#D9DDEA" /><rect x="870" y="418" width="208" height="68" rx="12" fill="#EEF0F8" stroke="#D9DDEA" /><text x="450" y="458" fill="#6F7489" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="start">SECURITY</text><text x="670" y="458" fill="#6F7489" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="start">AUDIT</text><text x="890" y="458" fill="#6F7489" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="start">RELIABILITY</text>
